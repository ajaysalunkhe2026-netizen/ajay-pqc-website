<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajay Salunkhe | Cyber Security Lab</title>

<style>
:root{
    --bg:#0a0f1d;
    --neon:#00ff66;
    --card:#131c31;
    --text:#e2e8f0;
    --math-orange: #ffaa00;
    --water-blue: #00bfff;
    --research-purple: #a855f7;
    --linkedin-blue: #0077b5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:monospace;
}

body{
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

/* ===== ADVANCED FULL-WIDTH HEADER ===== */
header{
    position:fixed;
    width:100%;
    background:rgba(10, 15, 29, 0.85);
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    z-index:1000;
    backdrop-filter: blur(10px);
}

nav{
    display:flex;
    justify-content:space-between;
    align-items: center;
    padding: 15px 5%;
    height: 75px;
}

.logo{
    color:var(--text);
    font-weight:bold;
    letter-spacing: 2px;
    font-size: 0.95rem;
}

.logo span {
    color: var(--neon);
}

/* ===== LINKEDIN CONNECT BUTTON ===== */
.linkedin-connect-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 119, 181, 0.05);
    border: 1px solid var(--linkedin-blue);
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: bold;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(0, 119, 181, 0.1);
}

.linkedin-connect-btn:hover {
    background: var(--linkedin-blue);
    color: #fff;
    box-shadow: 0 0 20px var(--linkedin-blue);
    transform: translateY(-1px);
}

.linkedin-icon {
    font-weight: 900;
    color: #fff;
    background: var(--linkedin-blue);
    padding: 1px 5px;
    border-radius: 2px;
    font-size: 0.75rem;
}

/* SECTIONS */
section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding: 60px 20px;
}

/* ===== FIXED CLEAN STATIC ELITE TEXT LAYOUT ===== */
.quote-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 25px;
    max-width: 850px;
    width: 90%;
    text-align: center;
}

.cyber-quote {
    font-size: clamp(16px, 3.5vw, 23px);
    color: var(--neon);
    font-weight: bold;
    letter-spacing: 1.5px;
    line-height: 1.8;
    text-shadow: 0 0 12px rgba(0, 255, 102, 0.1);
}

/* MECHANICAL ARROW MODULE */
.scroll-indicator {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
}

.arrow-label {
    font-size: 0.7rem;
    color: #8892b0;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.mechanical-arrow {
    font-size: 1.5rem;
    color: var(--math-orange);
    animation: arrow-bounce 1.5s infinite ease-in-out;
    font-weight: bold;
}

/* ===== HIGH-TECH UTILITY PORTAL BOARD ===== */
.portal-wrapper {
    display: flex;
    flex-direction: column;
    gap: 40px;
    width: 100%;
    max-width: 800px;
    align-items: center;
}

.tool-portal-box {
    background: linear-gradient(135deg, rgba(19, 28, 49, 0.9), rgba(10, 15, 29, 0.9));
    border: 1px dashed rgba(255, 255, 255, 0.05);
    padding: 35px;
    border-radius: 6px;
    text-align: center;
    width: 100%;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
    position: relative;
    transition: transform 0.2s ease;
}

.tool-portal-box:hover {
    transform: translateY(-2px);
}

.tool-portal-box.orange-accent { border-top: 3px solid var(--math-orange); }
.tool-portal-box.neon-accent { border-top: 3px solid var(--neon); }
.tool-portal-box.purple-accent { border-top: 3px solid var(--research-purple); }

/* DYNAMIC HOOK HANDLES RE-ENGINEERED */
.tool-portal-box::before {
    position: absolute;
    top: -11px;
    left: 20px;
    background: #16223d;
    font-size: 0.68rem;
    font-weight: bold;
    padding: 3px 10px;
    letter-spacing: 1.5px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.05);
}

.tool-portal-box.free-tool-tag::before { content: 'TRY OUR FREE TOOL'; color: var(--math-orange); }
.tool-portal-box.service-tag::before { content: 'TRY OUR SERVICE'; color: var(--neon); }
.tool-portal-box.research-tag::before { content: 'SEE OUR RESEARCH'; color: var(--research-purple); }

.tool-portal-box h3 {
    color: #fff;
    font-size: 1.25rem;
    margin-bottom: 12px;
    letter-spacing: 1px;
}

.tool-portal-box p {
    color: #8892b0;
    font-size: 0.85rem;
    line-height: 1.6;
    margin-bottom: 25px;
}

.portal-link-btn {
    display: inline-block;
    background: transparent;
    padding: 14px 28px;
    font-size: 0.9rem;
    font-weight: bold;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-radius: 4px;
    transition: all 0.3s ease;
    cursor: pointer;
}

.orange-accent .portal-link-btn {
    color: var(--math-orange);
    border: 2px solid var(--math-orange);
    box-shadow: 0 0 10px rgba(255, 170, 0, 0.05);
}

.orange-accent .portal-link-btn:hover {
    background: var(--math-orange);
    color: #0a0f1d;
    box-shadow: 0 0 20px var(--math-orange);
}

.neon-accent .portal-link-btn {
    color: var(--neon);
    border: 2px solid var(--neon);
    box-shadow: 0 0 10px rgba(0, 255, 102, 0.05);
}

.neon-accent .portal-link-btn:hover {
    background: var(--neon);
    color: #0a0f1d;
    box-shadow: 0 0 20px var(--neon);
}

.purple-accent .portal-link-btn {
    color: var(--research-purple);
    border: 2px solid var(--research-purple);
    box-shadow: 0 0 10px rgba(168, 85, 247, 0.05);
}

.purple-accent .portal-link-btn:hover {
    background: var(--research-purple);
    color: #0a0f1d;
    box-shadow: 0 0 20px var(--research-purple);
}

/* TARGET RIG AFFILIATE CONTAINER PACK */
.affiliate-image-section {
    width: 100%;
    margin-top: 20px;
    position: relative;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(0, 255, 102, 0.15);
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.rig-display-img {
    width: 100%;
    height: auto;
    display: block;
    max-height: 420px;
    object-fit: cover;
    filter: brightness(0.85);
    transition: filter 0.3s ease;
}

.tool-portal-box:hover .rig-display-img {
    filter: brightness(1);
}

/* PRECISE BUTTON PLACED UNDER THE RIG IMAGE */
.bottom-affiliate-btn {
    display: block;
    width: 100%;
    margin-top: 20px;
    background: transparent;
    border: 2px solid var(--neon);
    color: var(--neon);
    padding: 16px 20px;
    font-size: 0.9rem;
    font-weight: bold;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-radius: 4px;
    box-shadow: 0 0 15px rgba(0, 255, 102, 0.05);
    transition: all 0.2s ease;
    text-align: center;
