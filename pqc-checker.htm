<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PQC Security Audit Engine | Ajay Salunkhe</title>
    <style>
        body { background: #0a0f1d; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #131c31; padding: 30px; border-radius: 12px; border: 1px solid #00ff66; }
        textarea { width: 100%; height: 200px; background: #0a0f1d; color: #00ff66; border: 1px solid #374151; padding: 10px; border-radius: 5px; }
        button { background: #00ff66; color: #0a0f1d; border: none; padding: 12px 25px; margin-top: 15px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        #results { margin-top: 20px; padding: 15px; border-left: 4px solid #00ff66; background: #1f2937; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PQC Vulnerability Checker</h1>
        <p>Paste your cryptographic implementation code below for a real-time quantum-risk audit.</p>
        <textarea id="codeInput" placeholder="Paste your code here (e.g., RSA-1024, ECC-256 implementation)..."></textarea>
        <button onclick="runAudit()">RUN QUANTUM AUDIT</button>
        <div id="results">Waiting for input...</div>
    </div>

    <script>
        function runAudit() {
            const code = document.getElementById('codeInput').value;
            let report = "<h3>Audit Report:</h3>";
            
            // Vulnerability Database
            const patterns = [
                { regex: /RSA-1024/i, risk: "CRITICAL", fix: "Migrate to Lattice-based CRYSTALS-Dilithium." },
                { regex: /SHA-1/i, risk: "HIGH", fix: "Replace with SHA-3 or BLAKE3." },
                { regex: /ECC-256/i, risk: "MEDIUM", fix: "Transition to Falcon signature scheme." }
            ];

            let found = false;
            patterns.forEach(p => {
                if (p.regex.test(code)) {
                    report += `<p style="color: #ff4444;">[!] Found: ${p.regex.source} - <strong>Risk: ${p.risk}</strong><br>Fix: ${p.fix}</p>`;
                    found = true;
                }
            });

            if (!found) report += "<p style='color: #00ff66;'>[+] Code appears quantum-resilient based on basic scanning patterns.</p>";
            document.getElementById('results').innerHTML = report;
        }
    </script>
</body>
</html>
